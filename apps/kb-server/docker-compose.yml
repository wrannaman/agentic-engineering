services:
  # --- SQLite mode (default, simplest) ---
  # Just the server, no external database needed.
  # Data stored in a Docker volume.

  kb-server:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/kb.db}
      - KB_AUTH_TOKEN=${KB_AUTH_TOKEN:-}
      - REPO_URL=${REPO_URL:-}
      - REPO_BRANCH=${REPO_BRANCH:-main}
      - GH_TOKEN=${GH_TOKEN:-}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS:-300}
    volumes:
      - kb-data:/data
    profiles: ["default", "sqlite"]

